<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="assets/Logo.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Successful Matches</title>

<link rel="stylesheet" href="./src/css/home.css">
<link rel="stylesheet" href="./src/css/sidebar.css" />
<link rel="stylesheet" href="./src/css/snackbar.css" />

</head>

<body>

<header class="topbar">
<a href="home.html" class="app-title">LookingForLove</a>
<button id="menuBtn" class="menu-btn">&#9776;</button>
</header>

  <div id="overlay" class="overlay"></div>

  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <h2>Menu</h2>
      <button id="closeBtn" class="close-btn">&times;</button>
    </div>

    <nav class="sidebar-nav">
      <a href="home.html" class="nav-link">Home</a>
      <a href="profile.html" class="nav-link">My Profile</a>
      <a href="swipe.html" class="nav-link">Find Matches</a>
      <a href="matches.html" class="nav-link active">View My Matches</a>
      <button id="logoutBtn" class="logout-btn">Logout</button>
    </nav>
  </aside>

<main class="matches-page">

<h2 class="page-title" style="padding: 0.8em;">Successful Matches</h2>

<div id="successfulMatches" class="matches-grid" style="padding-left:0.8em;">
<p class="loading-text">Loading matches...</p>
</div>

<div id="ratingModal" class="modal" style="display:none;">
  <div class="modal-content">
    <h3>Rate this match</h3>

    <div id="starContainer">
      <span onclick="selectRating(1)">⭐</span>
      <span onclick="selectRating(2)">⭐</span>
      <span onclick="selectRating(3)">⭐</span>
      <span onclick="selectRating(4)">⭐</span>
      <span onclick="selectRating(5)">⭐</span>
    </div>

    <br>

      <textarea
      id="feedbackInput"
      placeholder="Leave optional feedback about this match..."
      style="width: 100%;  padding: 8px; margin-bottom: 8px;"
    ></textarea>

    <button class="edit-btn" onclick="submitRating()">Submit</button>
    <button class="edit-btn" onclick="closeRatingModal()">Cancel</button>
  </div>
</div>

<div id="confirmModal" class="modal" style="display:none;">
  <div class="modal-content">
    <h3>Share Contact Info</h3>
    <p>Do you want to share your email with this match?</p>

    <div class="modal-actions">
      <button class="edit-btn" onclick="confirmShareAction()">Yes</button>
      <button class="cancel-btn" onclick="closeConfirmModal()">Cancel</button>
    </div>
  </div>
</div>

</main>

<div id="snackbar">Email copied to clipboard!</div>

<script type="module" src="./src/matches.js"></script>
<script type="module" src="./src/util/sidebar.js"></script>

</body>
</html>
