<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swipe Matches</title>

<link rel="stylesheet" href="home.css">

</head>

<body>

<header class="topbar">
<a href="home.html" class="app-title">LookingForLove</a>
</header>

<main class="swipe-page">

<div id="swipeContainer"></div>

<div class="swipe-buttons">
<button id="noBtn" class="swipe-no">✖</button>
<button id="yesBtn" class="swipe-yes">❤</button>
</div>

</main>

<script type="module" src="./swipe.js"></script>

<div id="matchPopup" class="match-popup">

<div class="popup-content">

<h2>🎉 It's a Match!</h2>

<p>You both liked each other</p>

<div class="popup-buttons">
<button id="viewMatches">View Matches</button>
<button id="continueSwipe">Keep Swiping</button>
</div>

</div>

</div>

</html>
