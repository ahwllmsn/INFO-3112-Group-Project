<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swipe Matches</title>

<link rel="stylesheet" href="./src/css/home.css">
<link rel="stylesheet" href="./src/css/sidebar.css" />

</head>

<body>

<header class="topbar">
    <a href="home.html" class="app-title">LookingForLove</a>
  <button id="menuBtn" class="menu-btn">&#9776;</button>
</header>

<div id="overlay" class="overlay"></div>

<aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
        <h2>Menu</h2>
        <button id="closeBtn" class="close-btn">&times;</button>
    </div>
    <nav class="sidebar-nav">
        <a href="home.html" class="nav-link">Home</a>
        <a href="profile.html" class="nav-link">My Profile</a>
        <a href="swipe.html" class="nav-link active">Find Matches</a>
        <a href="matches.html" class="nav-link">View My Matches</a>
        <button id="logoutBtn" class="logout-btn">Logout</button>
    </nav>
</aside>


<main class="swipe-page">

<div id="swipeContainer"></div>

<div class="swipe-buttons">
<button id="noBtn" class="swipe-no" disabled>✖</button>
<button id="yesBtn" class="swipe-yes" disabled>❤</button>
</div>

</main>

<script type="module" src="./src/swipe.js"></script>
<script type="module" src="./src/util/sidebar.js"></script>


<div id="matchPopup" class="match-popup">

<div class="popup-content">

<h2>🎉 It's a Match!</h2>

<p>You both liked each other</p>

<div class="popup-buttons">
<button id="viewMatches">View Matches</button>
<button id="continueSwipe">Keep Swiping</button>
</div>

</div>

</div>

</body>
</html>
