<!doctype html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="assets/Logo.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Profile</title>

<link rel="stylesheet" href="./style.css">

</head>

<body>

  <header class="topbar">
  <a href="home.html" class="app-title">LookingForLove</a>
  <button id="menuBtn" class="menu-btn">&#9776;</button>
</header>

<div id="overlay" class="overlay"></div>

<aside id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <h2>Menu</h2>
    <button id="closeBtn" class="close-btn">&times;</button>
  </div>

  <nav class="sidebar-nav">
    <a href="home.html">Home</a>
    <a href="profile.html" class="active">Profile</a>
    <button id="logoutBtn" class="logout-btn">Logout</button>
  </nav>
</aside>

<main class="profile-page">

<div class="profile-card">

<div class="profile-header">

<h2>User Profile</h2>

<button class="edit-btn" id="editBtn">Edit</button>

</div>


<div class="profile-info">

<label>Name</label>
<input id="name" placeholder="Enter your name" disabled>


<label>Email</label>
<input id="email" placeholder="Enter your email" disabled>


<label>Age</label>
<input id="age" type="number" placeholder="Enter your age" disabled>

<label>Gender</label>
<select id="gender" disabled>
  <option value="">Select Gender</option>
  <option value="Male">Male</option>
  <option value="Female">Female</option>
  <option value="Other">Other</option>
</select>


<label>Location</label>
<input id="location" placeholder="City / Country" disabled>


<label>Bio</label>
<input id="bio" placeholder="Tell something about yourself" disabled>

  <label>Interested In</label>
<select id="matchGender" disabled>
  <option value="">Select Preference</option>
  <option value="Male">Male</option>
  <option value="Female">Female</option>
  <option value="Other">Other</option>
  <option value="Anyone">Anyone</option>
</select>

<label>Looking For</label>

<select id="preference" disabled>

<option value="Friend">Friend</option>
<option value="Love">Love</option>

</select>



<label>My Technical Skills (select up to 3)</label>
<select id="ownedSkillSelect">
  <option value="">Select Skill</option>
  <option value="JavaScript">JavaScript</option>
  <option value="Python">Python</option>
  <option value="Java">Java</option>
  <option value="C++">C++</option>
  <option value="React">React</option>
  <option value="Node.js">Node.js</option>
</select>
<div id="skillsOwned" class="skill-tags"></div>

<label>Skills I Want In Partner (select up to 3)</label>
<select id="wantedSkillSelect">
  <option value="">Select Skill</option>
  <option value="JavaScript">JavaScript</option>
  <option value="Python">Python</option>
  <option value="Java">Java</option>
  <option value="C++">C++</option>
  <option value="React">React</option>
  <option value="Node.js">Node.js</option>
</select>
<div id="skillsWanted" class="skill-tags"></div>

<label>Profile Photos (max 3)</label>
<input type="file" id="select-local-image" accept="image/*" multiple>
<div id="photoPreview"></div>

</div>

</div>

</main>


<script type="module" src="./profile.js"></script>

</body>
</html>
